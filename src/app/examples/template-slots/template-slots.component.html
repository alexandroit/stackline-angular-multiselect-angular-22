<section class="skin-section">
  <div class="section-heading">
    <p class="eyebrow">Customization</p>
    <h2>Template slots</h2>
    <p class="example-copy">Projected templates expose item, label, selected, disabled, index, group, and ARIA state.</p>
  </div>

  <article class="example-row">
    <div class="demo-cell custom-skin-sample">
      <angular-multiselect
        [data]="itemList"
        [(ngModel)]="selectedItems"
        [settings]="settings">
        <c-badge>
          <ng-template let-item="item" let-label="label">
            <span class="badge-template">
              <strong>{{ item.code }}</strong>
              <span>{{ label }}</span>
            </span>
          </ng-template>
        </c-badge>

        <c-item>
          <ng-template
            let-item="item"
            let-label="label"
            let-selected="selected"
            let-disabled="disabled"
            let-ariaChecked="ariaChecked">
            <span class="country-option" [attr.data-aria-checked]="ariaChecked">
              <span class="country-code">{{ item.code }}</span>
              <span class="country-copy">
                <strong>{{ label }}</strong>
                <small>{{ item.region }} <span *ngIf="disabled">disabled</span></small>
              </span>
              <span class="selected-mark" *ngIf="selected">Selected</span>
            </span>
          </ng-template>
        </c-item>
      </angular-multiselect>
    </div>

    <div class="code-cell">
      <app-example-source [slug]="example.slug"></app-example-source>
    </div>
  </article>
</section>
