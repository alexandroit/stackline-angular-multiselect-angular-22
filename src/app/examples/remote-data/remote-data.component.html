<section class="skin-section">
  <div class="section-heading">
    <p class="eyebrow">Remote data</p>
    <h2>Data from remote API</h2>
    <p class="example-copy">Remote-style object list with labelKey and grouping.</p>
    <a class="stackblitz-row-link" href="https://stackblitz.com/github/alexandroit/stackline-angular-multiselect-angular-22?startScript=start&initialpath=%2Fremote-data" target="_blank" rel="noopener">Open this route in StackBlitz</a>
  </div>

  <article class="example-row">
    <div class="demo-cell">
        <div class="dropdown-stack">
          <angular-multiselect
            [data]="countriesMeta"
            [(ngModel)]="remoteDataSelected"
            [settings]="remoteDataSettings"
            (onSelect)="record('select', $event)"
            (onDeSelect)="record('deselect', $event)"
            (onSelectAll)="record('selectAll', $event)"
            (onDeSelectAll)="record('deselectAll', $event)"
          ></angular-multiselect>
          <p class="settings-preview">skin: {{ remoteDataSettings.skin }}</p>
        </div>
    </div>

    <div class="code-cell">
      <app-example-source [slug]="example.slug"></app-example-source>
    </div>
  </article>
</section>

<section class="activity">
  <h2>Event log</h2>
  <p *ngFor="let event of events">{{ event }}</p>
</section>
